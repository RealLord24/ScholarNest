<!DOCTYPE html>
<html>
<head>
    <title>ScholarNest</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>ScholarNest</h1>
    <p>Your Smart Study Companion</p>
</header>

<div class="container">

    <button onclick="showSection('mcq')">MCQ Practice</button>
    <button onclick="showSection('exam')">Exam Simulation</button>
    <button onclick="showSection('summary')">Course Summaries</button>

</div>

<div id="content">

    <div id="mcq" class="section">
        <h2>MCQ Practice</h2>
        <p id="question"></p>

        <button onclick="checkAnswer('A')">A</button>
        <button onclick="checkAnswer('B')">B</button>
        <button onclick="checkAnswer('C')">C</button>
        <button onclick="checkAnswer('D')">D</button>

        <p id="result"></p>
    </div>

    <div id="exam" class="section">
        <h2>Exam Simulation</h2>
        <p>This feature will simulate timed exams.</p>
        <button onclick="startExam()">Start Exam</button>
        <p id="timer"></p>
    </div>

    <div id="summary" class="section">
        <h2>Course Summaries</h2>
        <ul>
            <li>Database Management – Overview of relational models.</li>
            <li>Operating Systems – Process management and memory.</li>
            <li>C++ Programming – Variables, loops, and functions.</li>
        </ul>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
